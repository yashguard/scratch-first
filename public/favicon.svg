<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#7D1A2B"/>
  <!-- Decorative thin ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#C4933A" stroke-width="0.8" opacity="0.6"/>
  <!-- "P" initial -->
  <text
    x="13"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="400"
    font-style="italic"
    fill="#C4933A"
    text-anchor="middle"
  >P</text>
  <!-- "&" symbol -->
  <text
    x="32"
    y="38"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="400"
    fill="#E8C878"
    text-anchor="middle"
    opacity="0.9"
  >&amp;</text>
  <!-- "A" initial -->
  <text
    x="51"
    y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="400"
    font-style="italic"
    fill="#C4933A"
    text-anchor="middle"
  >A</text>
</svg>
