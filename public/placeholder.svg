<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#F5EDD8"/>
  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="276" fill="none" stroke="#C4933A" stroke-width="1.5" opacity="0.5"/>
  <rect x="18" y="18" width="364" height="264" fill="none" stroke="#C4933A" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner ornaments -->
  <g stroke="#C4933A" stroke-width="1" fill="none" opacity="0.7">
    <path d="M12,30 L12,12 L30,12"/>
    <path d="M370,12 L388,12 L388,30"/>
    <path d="M12,270 L12,288 L30,288"/>
    <path d="M370,288 L388,288 L388,270"/>
  </g>
  <!-- Floral/mandala center motif -->
  <g transform="translate(200,135)" fill="#C4933A" opacity="0.25">
    <circle r="40" fill="none" stroke="#C4933A" stroke-width="1"/>
    <circle r="25" fill="none" stroke="#C4933A" stroke-width="0.8"/>
    <circle r="8" fill="#C4933A"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#C4933A" stroke-width="0.6"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#C4933A" stroke-width="0.6"/>
    <line x1="-28" y1="-28" x2="28" y2="28" stroke="#C4933A" stroke-width="0.6"/>
    <line x1="28" y1="-28" x2="-28" y2="28" stroke="#C4933A" stroke-width="0.6"/>
  </g>
  <!-- Couple name text -->
  <text
    x="200" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-style="italic"
    fill="#7D1A2B"
    text-anchor="middle"
    opacity="0.85"
  >Priya &amp; Arjun</text>
  <!-- Sub-label -->
  <text
    x="200" y="220"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    letter-spacing="3"
    fill="#C4933A"
    text-anchor="middle"
    opacity="0.6"
  >WEDDING INVITATION</text>
</svg>
